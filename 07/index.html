<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Famílias de Fontes</title>

    <style>
        .conteudo{
            font-size: 8px;
        }

        .fonteSerif{
            font-family: "Times New Roman", serif;
            font-size: 10em;
        }

        .fonteSansSerif{
            font-family: Verdana, sans-serif;
            font-size: 5em;
        }

        .fonteMonospace{
            font-family: "Courier New", monospace;
            font-size: 2.5em;
        }
    </style>
</head>

<body>

    <div class="conteudo">

        <p class="fonteSerif">
            Programação Web
        </p>

        <p class="fonteSansSerif">
            Programação Web
        </p>

        <p class="fonteMonospace">
            Programação Web
        </p>

    </div>

</body>
</html>
