<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Exercício CSS3 - Figuras Lado a Lado</title>
  <!-- Link que conecta com o arquivo de estilos CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Container principal que segura as duas figuras lado a lado -->
  <div class="layout-container">

    <!-- FIGURA 1: A FLOR -->
    <div class="flor-container">
      <div class="petala vermelha"></div>
      <div class="petala amarela"></div>
      <div class="petala verde"></div>
      <div class="petala roxa"></div>
    </div>

    <!-- FIGURA 2: O CÍRCULO DIVIDIDO -->
    <div class="circulo-container">
      <div class="fatia vermelha"></div>
      <div class="fatia amarela"></div>
      <div class="fatia verde"></div>
      <div class="fatia roxa"></div>
    </div>

  </div>

</body>
</html>
