<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio: Criando uma Página Web com div</title>
    <style>
        /* Configurações gerais para resetar as margens padrão */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            padding: 20px;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Container principal para limitar a largura da página, igual ao slide */
        .container {
            width: 100%;
            max-width: 800px;
        }

        /* 1. Cabeçalho (Verde) */
        .header {
            background-color: #0b8a43;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            border: 2px solid #ff3333; /* Borda vermelha do exemplo */
            border-bottom: none; /* Evita sobreposição de bordas */
        }

        /* Container do meio para colocar a barra lateral e o conteúdo lado a lado */
        .main-container {
            display: flex;
            width: 100%;
        }

        /* 2. Barra Lateral (Esquerda) */
        .sidebar {
            background-color: #e6f2ff;
            width: 25%; /* Ocupa 25% da largura */
            padding: 20px;
            border: 2px solid #ff3333;
            border-bottom: none;
        }

        .sidebar ul {
            list-style-position: inside; /* Mantém as bolinhas alinhadas dentro */
        }

        .sidebar li {
            margin-bottom: 10px;
        }

        /* 3. Conteúdo Principal (Direita) */
        .content {
            background-color: #f9fbfd;
            width: 75%; /* Ocupa os 75% restantes */
            padding: 20px;
            border: 2px solid #ff3333;
            border-left: none; /* Evita borda dupla com a barra lateral */
            border-bottom: none;
        }

        .content p {
            margin-bottom: 15px;
        }

        /* 4. Rodapé (Escuro) */
        .footer {
            background-color: #1a252f;
            color: white;
            text-align: center;
            padding: 10px;
            font-size: 14px;
            border: 2px solid #ff3333;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            Minha Página Web
        </div>

        <div class="main-container">
            <div class="sidebar">
                <ul>
                    <li>Item 1</li>
                    <li>Item 2</li>
                    <li>Item 3</li>
                </ul>
            </div>

            <div class="content">
                <p>Este é o conteúdo principal da página.</p>
                <p>Adicione mais parágrafos ou elementos conforme necessário.</p>
            </div>
        </div>

        <div class="footer">
            Rodapé da Página
        </div>
    </div>

</body>
</html>
