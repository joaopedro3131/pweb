<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio: Criando uma Página Web com div</title>
    <style>
        /* Reset de margens padrão */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            padding: 40px 20px;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Moldura Verde Escura Externa */
        .moldura-principal {
            background-color: #0b5a30; /* Verde escuro do fundo */
            width: 100%;
            max-width: 900px;
            padding: 20px; /* Este padding cria o espaço verde ao redor de todo o conteúdo */
            border-radius: 4px;
        }

        /* 1. Cabeçalho (Verde Mais Claro) */
        .header {
            background-color: #118244; /* Verde mais claro */
            color: white;
            text-align: center;
            padding: 25px;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px; /* Espaço abaixo do cabeçalho */
            border: 2px solid #ffffff; /* Opcional: bordinha interna clara se desejar destacar */
        }

        /* Container que junta a Barra Lateral e o Conteúdo */
        .main-container {
            display: flex;
            margin-bottom: 20px; /* Espaço abaixo do bloco do meio */
            gap: 20px; /* Cria o espaço em branco/verde vertical ENTRE a barra lateral e o conteúdo */
        }

        /* 2. Barra Lateral (Esquerda) */
        .sidebar {
            background-color: #ffffff; /* Fundo branco ou levemente azulado */
            width: 25%; /* Largura da barra */
            padding: 25px 20px;
            border: 1px solid #b0c4de;
            min-height: 250px;
        }

        .sidebar ul {
            list-style-position: inside;
        }

        .sidebar li {
            margin-bottom: 12px;
            color: #333;
        }

        /* 3. Conteúdo Principal (Direita) */
        .content {
            background-color: #ffffff;
            width: 75%; /* Ocupa o restante do espaço */
            padding: 25px;
            border: 1px solid #b0c4de;
        }

        .content p {
            margin-bottom: 15px;
            color: #333;
            line-height: 1.5;
        }

        /* 4. Rodapé (Azul Escuro) */
        .footer {
            background-color: #1a252f; /* Azul escuro/grafite */
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="moldura-principal">
        
        <div class="header">
            Minha Página Web
        </div>

        <div class="main-container">
            <div class="sidebar">
                <ul>
                    <li>Item 1</li>
                    <li>Item 2</li>
                    <li>Item 3</li>
                </ul>
            </div>

            <div class="content">
                <p>Este é o conteúdo principal da página.</p>
                <p>Adicione mais parágrafos ou elementos conforme necessário.</p>
            </div>
        </div>

        <div class="footer">
            Rodapé da Página
        </div>

    </div>

</body>
</html>
