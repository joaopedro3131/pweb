<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 17 - Sistema de Grid</title>
    <!-- Link do Bootstrap CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Estilos opcionais apenas para deixar as imagens organizadas e com espaçamento */
        .galeria img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Faz a imagem preencher o espaço sem distorcer */
            border-radius: 4px;
        }
        /* Ajuste de altura para simular o layout perfeitamente */
        .img-grande {
            height: 420px;
        }
        .img-topo-direita {
            height: 130px;
        }
        .img-meio-direita {
            height: 130px;
        }
        .img-baixo-direita {
            height: 120px;
        }
    </style>
</head>
<body>

    <div class="container mt-5">
        <h2 class="text-center mb-4">Galeria de Imagens (Exercício Grid)</h2>
        
        <!-- Começo da Grid Principal -->
        <div class="row g-2 galeria"> <!-- 'g-2' adiciona um pequeno espaçamento (gutter) entre as colunas -->
            
            <!-- COLUNA DA ESQUERDA: Imagem Grande -->
            <div class="col-md-6">
                <img src="https://placecat.com/600/420" alt="Gato Grande" class="img-grande">
            </div>
            
            <!-- COLUNA DA DIREITA: Bloco com várias imagens de gatos -->
            <div class="col-md-6">
                <div class="row g-2">
                    
                    <!-- Linha Superior da Direita (1 imagem inteira) -->
                    <div class="col-12">
                        <img src="https://placecat.com/600/130" alt="Gato Topo" class="img-topo-direita">
                    </div>
                    
                    <!-- Linha do Meio da Direita (2 imagens lado a lado) -->
                    <div class="col-6">
                        <img src="https://placecat.com/300/130" alt="Gato Meio 1" class="img-meio-direita">
                    </div>
                    <div class="col-6">
                        <img src="https://placecat.com/300/130" alt="Gato Meio 2" class="img-meio-direita">
                    </div>
                    
                    <!-- Linha Inferior da Direita (3 imagens lado a lado) -->
                    <div class="col-4">
                        <img src="https://placecat.com/200/120" alt="Gato Baixo 1" class="img-baixo-direita">
                    </div>
                    <div class="col-4">
                        <img src="https://placecat.com/200/120" alt="Gato Baixo 2" class="img-baixo-direita">
                    </div>
                    <div class="col-4">
                        <img src="https://placecat.com/200/120" alt="Gato Baixo 3" class="img-baixo-direita">
                    </div>
                    
                </div>
            </div>
            
        </div>
        <!-- Fim da Grid Principal -->
    </div>

    <!-- Bootstrap Bundle com Popper.js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
