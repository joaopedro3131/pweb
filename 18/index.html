<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link rel="stylesheet"
    href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

    <!-- CSS externo -->
    <link rel="stylesheet" href="style.css">

    <title>Atividade 18 - Formulários e Tabelas</title>
</head>
<body>

<div class="container">

    <h1>Formulários</h1>

    <h2>Atividade 18 - Formulários e Tabelas</h2>

    <div class="caixa">

        <div class="row">

            <!-- Cadastro -->
            <div class="col-md-8">

                <h3>Cadastre-se</h3>

                <form>

                    <div class="form-group">
                        <label>Nome</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="form-group">
                        <label>E-mail</label>
                        <input type="email" class="form-control">
                    </div>

                    <div class="form-group">
                        <label>Senha</label>
                        <input type="password" class="form-control">
                    </div>

                    <div class="checkbox">
                        <label>
                            <input type="checkbox">
                            Aceito os termos do serviço
                        </label>
                    </div>

                    <div class="radio">
                        <label>
                            <input type="radio" name="curso">
                            PHP
                        </label>

                        <label>
                            <input type="radio" name="curso">
                            Java
                        </label>
                    </div>

                    <button type="submit" class="btn btn-default">
                        Cadastrar
                    </button>

                </form>

            </div>

            <!-- Login -->
            <div class="col-md-4">

                <h3>Logar</h3>

                <form>

                    <div class="form-group">
                        <input type="email"
                        class="form-control"
                        placeholder="Digite seu e-mail">
                    </div>

                    <div class="form-group">
                        <input type="password"
                        class="form-control"
                        placeholder="Digite sua senha">
                    </div>

                    <button type="submit"
                    class="btn btn-primary">
                        Logar
                    </button>

                </form>

            </div>

        </div>

    </div>

    <div class="tabela">

        <h2>Tabela Bootstrap</h2>

        <table class="table table-striped table-hover table-condensed">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Curso</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>1</td>
                    <td>João</td>
                    <td>Informática</td>
                </tr>

                <tr>
                    <td>2</td>
                    <td>Maria</td>
                    <td>Redes</td>
                </tr>

                <tr>
                    <td>3</td>
                    <td>Pedro</td>
                    <td>ADS</td>
                </tr>

                <tr>
                    <td>4</td>
                    <td>Ana</td>
                    <td>Segurança</td>
                </tr>
            </tbody>

        </table>

    </div>

</div>

</body>
</html>
